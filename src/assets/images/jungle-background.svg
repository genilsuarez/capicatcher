<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <!-- Sky: rich blue at top, warm haze at horizon (atmospheric perspective) -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#3D9FD8"/>
      <stop offset="52%"  style="stop-color:#82C8E8"/>
      <stop offset="100%" style="stop-color:#C2E5F5"/>
    </linearGradient>

    <!-- Sun: warm glow that fades out -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#FFF8B0;stop-opacity:1"/>
      <stop offset="40%"  style="stop-color:#FFD84A;stop-opacity:0.65"/>
      <stop offset="100%" style="stop-color:#FFB820;stop-opacity:0"/>
    </radialGradient>

    <!-- Far hazy hills -->
    <linearGradient id="farHillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#92BCA8"/>
      <stop offset="100%" style="stop-color:#6A9E80"/>
    </linearGradient>

    <!-- Mid hills -->
    <linearGradient id="midHillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#58A865"/>
      <stop offset="100%" style="stop-color:#3C8845"/>
    </linearGradient>

    <!-- Main ground -->
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#60BA55"/>
      <stop offset="100%" style="stop-color:#459048"/>
    </linearGradient>

    <!-- Tree canopy A: warm greens with highlight -->
    <radialGradient id="canopyA" cx="36%" cy="28%" r="64%">
      <stop offset="0%"   style="stop-color:#90D878"/>
      <stop offset="50%"  style="stop-color:#52A858"/>
      <stop offset="100%" style="stop-color:#357838"/>
    </radialGradient>

    <!-- Tree canopy B: cooler, deeper greens -->
    <radialGradient id="canopyB" cx="36%" cy="28%" r="64%">
      <stop offset="0%"   style="stop-color:#78CC65"/>
      <stop offset="50%"  style="stop-color:#429A48"/>
      <stop offset="100%" style="stop-color:#286830"/>
    </radialGradient>

    <!-- Soft drop shadow for trees -->
    <filter id="treeFx" x="-25%" y="-15%" width="155%" height="155%">
      <feDropShadow dx="4" dy="5" stdDeviation="5" flood-color="#1A5520" flood-opacity="0.28"/>
    </filter>

    <!-- Cloud volume shadow -->
    <filter id="cloudFx" x="-8%" y="-15%" width="120%" height="145%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4080B0" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ═══ SKY ═══ -->
  <rect width="600" height="400" fill="url(#skyGrad)"/>

  <!-- ═══ SUN (upper-right, partially peeking) ═══ -->
  <circle cx="536" cy="58" r="58" fill="url(#sunGlow)"/>
  <circle cx="536" cy="58" r="30" fill="#FFE650" opacity="0.96"/>
  <circle cx="536" cy="58" r="22" fill="#FFF8B0" opacity="0.75"/>

  <!-- ═══ CLOUDS ═══ -->
  <!-- Cloud A — large, left side -->
  <g filter="url(#cloudFx)" opacity="0.96">
    <ellipse cx="138" cy="72"  rx="50" ry="23" fill="white"/>
    <ellipse cx="108" cy="80"  rx="32" ry="21" fill="white"/>
    <ellipse cx="164" cy="78"  rx="36" ry="20" fill="white"/>
    <ellipse cx="138" cy="87"  rx="47" ry="19" fill="white"/>
    <!-- Subtle underside tint for volume -->
    <ellipse cx="138" cy="91"  rx="42" ry="9"  fill="#BDD8EE" opacity="0.35"/>
  </g>

  <!-- Cloud B — medium, upper-center-right -->
  <g filter="url(#cloudFx)" opacity="0.82">
    <ellipse cx="398" cy="50"  rx="38" ry="18" fill="white"/>
    <ellipse cx="373" cy="57"  rx="25" ry="16" fill="white"/>
    <ellipse cx="420" cy="56"  rx="28" ry="15" fill="white"/>
    <ellipse cx="398" cy="64"  rx="35" ry="15" fill="white"/>
    <ellipse cx="398" cy="67"  rx="30" ry="7"  fill="#BDD8EE" opacity="0.32"/>
  </g>

  <!-- Cloud C — small, mid sky, adds depth -->
  <g opacity="0.55">
    <ellipse cx="265" cy="90"  rx="24" ry="11" fill="white"/>
    <ellipse cx="248" cy="96"  rx="16" ry="10" fill="white"/>
    <ellipse cx="280" cy="95"  rx="18" ry="9"  fill="white"/>
    <ellipse cx="265" cy="100" rx="22" ry="8"  fill="white"/>
  </g>

  <!-- ═══ DISTANT HILLS (desaturated, atmospheric depth) ═══ -->
  <path d="M0,228 Q80,205 165,218 Q255,202 345,215 Q430,204 520,216 Q560,210 600,218
           L600,275 L0,275 Z"
        fill="url(#farHillGrad)" opacity="0.52"/>

  <!-- ═══ MID HILLS ═══ -->
  <path d="M-5,264 Q60,244 138,256 Q210,240 285,252 Q362,241 438,254 Q508,244 605,256
           L605,322 L-5,322 Z"
        fill="url(#midHillGrad)"/>

  <!-- ═══ DEPTH / BACKGROUND TREES (faded, smaller) ═══ -->
  <g opacity="0.48">
    <rect x="245" y="224" width="7" height="26" rx="3" fill="#5A3818"/>
    <ellipse cx="248" cy="215" rx="18" ry="23" fill="#4A7A50"/>
    <ellipse cx="241" cy="210" rx="10" ry="12" fill="#5C9058" opacity="0.7"/>
  </g>
  <g opacity="0.44">
    <rect x="342" y="228" width="6" height="22" rx="3" fill="#5A3818"/>
    <ellipse cx="345" cy="220" rx="15" ry="19" fill="#3D6E45"/>
    <ellipse cx="338" cy="217" rx="9"  ry="11" fill="#4E8050" opacity="0.65"/>
  </g>

  <!-- ═══ TREE GROUND SHADOWS ═══ -->
  <ellipse cx="96"  cy="310" rx="30" ry="9"  fill="#1E6020" opacity="0.28"/>
  <ellipse cx="178" cy="305" rx="38" ry="11" fill="#1E6020" opacity="0.28"/>
  <ellipse cx="420" cy="308" rx="34" ry="10" fill="#1E6020" opacity="0.28"/>
  <ellipse cx="506" cy="302" rx="42" ry="12" fill="#1E6020" opacity="0.28"/>

  <!-- ═══ MAIN GROUND ═══ -->
  <path d="M0,294 Q75,278 152,286 Q228,272 304,281 Q380,270 456,279 Q528,268 600,278
           L600,400 L0,400 Z"
        fill="url(#groundGrad)"/>

  <!-- Subtle ground contour for depth -->
  <path d="M0,320 Q150,310 300,317 Q450,307 600,314"
        fill="none" stroke="#428040" stroke-width="2.5" opacity="0.38" stroke-linecap="round"/>
  <path d="M0,342 Q150,333 300,339 Q450,329 600,336"
        fill="none" stroke="#3A7838" stroke-width="1.8" opacity="0.26" stroke-linecap="round"/>

  <!-- ═══ LEFT FOREGROUND TREES ═══ -->

  <!-- Tree L1 — small, leftmost -->
  <g filter="url(#treeFx)">
    <rect x="79"  y="264" width="8"  height="32" rx="4" fill="#7B5230"/>
    <!-- Shadow mass (offset right-down) -->
    <ellipse cx="88"  cy="258" rx="20" ry="27" fill="#357838"/>
    <!-- Main canopy -->
    <ellipse cx="82"  cy="250" rx="23" ry="30" fill="url(#canopyA)"/>
    <!-- Highlight cluster -->
    <ellipse cx="72"  cy="241" rx="11" ry="13" fill="#A8E085" opacity="0.55"/>
  </g>

  <!-- Tree L2 — larger, more character -->
  <g filter="url(#treeFx)">
    <rect x="163" y="256" width="11" height="40" rx="5" fill="#7B5230"/>
    <!-- Shadow mass -->
    <ellipse cx="173" cy="249" rx="27" ry="36" fill="#2E7035"/>
    <!-- Main canopy -->
    <ellipse cx="166" cy="238" rx="32" ry="40" fill="url(#canopyB)"/>
    <!-- Highlight cluster -->
    <ellipse cx="153" cy="228" rx="16" ry="19" fill="#98DC80" opacity="0.52"/>
    <!-- Side companion blob -->
    <ellipse cx="183" cy="252" rx="14" ry="17" fill="#52A858" opacity="0.68"/>
  </g>

  <!-- ═══ RIGHT FOREGROUND TREES ═══ -->

  <!-- Tree R1 -->
  <g filter="url(#treeFx)">
    <rect x="417" y="258" width="9"  height="38" rx="4" fill="#7B5230"/>
    <!-- Shadow mass -->
    <ellipse cx="426" cy="252" rx="23" ry="31" fill="#357838"/>
    <!-- Main canopy -->
    <ellipse cx="420" cy="244" rx="28" ry="36" fill="url(#canopyA)"/>
    <!-- Highlight -->
    <ellipse cx="410" cy="234" rx="13" ry="16" fill="#A8E085" opacity="0.52"/>
  </g>

  <!-- Tree R2 — tallest, far right -->
  <g filter="url(#treeFx)">
    <rect x="497" y="250" width="12" height="46" rx="5" fill="#6B4020"/>
    <!-- Shadow mass -->
    <ellipse cx="509" cy="244" rx="32" ry="43" fill="#286830"/>
    <!-- Main canopy -->
    <ellipse cx="502" cy="232" rx="38" ry="48" fill="url(#canopyB)"/>
    <!-- Highlight cluster -->
    <ellipse cx="488" cy="220" rx="19" ry="23" fill="#98DC80" opacity="0.48"/>
    <!-- Side companion blob -->
    <ellipse cx="520" cy="247" rx="16" ry="20" fill="#52A858" opacity="0.62"/>
  </g>

  <!-- ═══ GROUND DETAILS ═══ -->

  <!-- Small bushes between trees -->
  <ellipse cx="228" cy="344" rx="20" ry="11" fill="#3A9040" opacity="0.68"/>
  <ellipse cx="241" cy="340" rx="13" ry="8"  fill="#54B050" opacity="0.62"/>

  <ellipse cx="360" cy="342" rx="18" ry="10" fill="#3A9040" opacity="0.68"/>
  <ellipse cx="349" cy="338" rx="12" ry="7"  fill="#54B050" opacity="0.60"/>

  <!-- Flowers — left cluster -->
  <g opacity="0.88">
    <circle cx="44"  cy="352" r="3.8" fill="#FFE030"/>
    <circle cx="52"  cy="347" r="3.0" fill="#FF8830"/>
    <circle cx="38"  cy="348" r="3.2" fill="#FF5888"/>
    <line x1="44" y1="355" x2="44" y2="362" stroke="#3A8830" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="52" y1="350" x2="52" y2="358" stroke="#3A8830" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="38" y1="351" x2="38" y2="360" stroke="#3A8830" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Flowers — right cluster -->
  <g opacity="0.85">
    <circle cx="558" cy="348" r="3.5" fill="#FFE030"/>
    <circle cx="566" cy="353" r="3.8" fill="#FF8830"/>
    <circle cx="550" cy="352" r="3.0" fill="#FF5888"/>
    <line x1="558" y1="351" x2="558" y2="360" stroke="#3A8830" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="566" y1="356" x2="566" y2="364" stroke="#3A8830" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="550" y1="355" x2="550" y2="363" stroke="#3A8830" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Tiny distant flower dots for ground richness -->
  <circle cx="310" cy="350" r="2.5" fill="#FFE030" opacity="0.65"/>
  <circle cx="320" cy="354" r="2"   fill="#FF5888" opacity="0.60"/>
  <circle cx="290" cy="356" r="2"   fill="#FFE030" opacity="0.55"/>
  <circle cx="470" cy="348" r="2.5" fill="#FF8830" opacity="0.60"/>
  <circle cx="130" cy="352" r="2"   fill="#FF5888" opacity="0.60"/>
</svg>
